name: wabway
description: Private collaborative trip-planning app for small friend groups.
publish_to: 'none'

version: 1.1.0+11

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  google_fonts: ^6.2.1
  go_router: ^14.2.7
  url_launcher: ^6.3.1
  supabase_flutter: ^2.0.0
  file_picker: ^8.0.0
  image_picker: ^1.1.0
  receive_sharing_intent: ^1.4.5
  flutter_map: ^7.0.2
  latlong2: ^0.9.0
  http: ^1.2.0
  package_info_plus: ^8.0.0
  share_plus: ^10.0.0
  shared_preferences: ^2.3.0
  google_mlkit_text_recognition: ^0.13.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/wabway_icon.png"
  adaptive_icon_background: "#F8F3EA"
  adaptive_icon_foreground: "assets/icon/wabway_icon.png"
  min_sdk_android: 23