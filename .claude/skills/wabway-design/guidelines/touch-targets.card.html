<!-- @dsCard group="Spacing" viewport="700x150" name="Touch Targets" subtitle="44px minimum, 52px comfortable — for one-handed use while travelling" -->
<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; background:var(--color-bg); font-family: var(--font-sans); padding: 20px 22px; display:flex; gap: 24px; align-items: flex-end; }
  .col { display:flex; flex-direction:column; align-items:center; gap: 8px; }
  .box { background: var(--color-primary); border-radius: var(--radius-pill); color:#fff; display:flex; align-items:center; justify-content:center; font-family: var(--font-mono); font-size: 12px; }
  .lbl { font-size: 12px; color: var(--color-text-secondary); }
</style></head>
<body>
  <div class="col"><div class="box" style="width:44px; height:44px;">44</div><span class="lbl">minimum</span></div>
  <div class="col"><div class="box" style="width:52px; height:52px;">52</div><span class="lbl">comfortable</span></div>
</body></html>
