<!-- @dsCard group="Colors" viewport="700x150" name="Neutrals & Surfaces" subtitle="Background, card, sunken surface, borders" -->
<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; font-family: var(--font-sans); }
  .row { display:flex; height:150px; }
  .sw { flex:1; display:flex; flex-direction:column; justify-content:flex-end; padding:10px 12px; border-right:1px solid rgba(0,0,0,0.06); }
  .name { font-weight:700; font-size:13px; color:var(--color-text-primary); }
  .hex { font-family: var(--font-mono); font-size:11px; color:var(--color-text-secondary); }
</style></head>
<body>
<div class="row">
  <div class="sw" style="background:var(--base-cream)"><div class="name">Background</div><div class="hex">#F8F3EA</div></div>
  <div class="sw" style="background:var(--color-bg-raised)"><div class="name">Background Raised</div><div class="hex">#FBF8F2</div></div>
  <div class="sw" style="background:var(--base-paper)"><div class="name">Surface / Card</div><div class="hex">#FFFDF8</div></div>
  <div class="sw" style="background:var(--color-surface-sunken)"><div class="name">Surface Sunken</div><div class="hex">#F1EAE0</div></div>
  <div class="sw" style="background:var(--base-sand)"><div class="name">Border</div><div class="hex">#E6DCCF</div></div>
</div>
</body></html>
