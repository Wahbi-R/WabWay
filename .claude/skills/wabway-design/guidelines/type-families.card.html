<!-- @dsCard group="Type" viewport="700x220" name="Type Families" subtitle="Plus Jakarta Sans (UI), Lora (display/editorial), IBM Plex Mono (codes & figures)" -->
<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; background:var(--color-surface); font-family: var(--font-sans); padding: 18px 22px; }
  .row { display:flex; align-items:baseline; gap: 14px; padding: 10px 0; border-bottom: 1px solid var(--color-border); }
  .row:last-child { border-bottom: none; }
  .tag { width: 150px; font-size: 11px; color: var(--color-text-tertiary); text-transform: uppercase; letter-spacing: 0.04em; }
  .sample { font-size: 26px; color: var(--color-text-primary); }
</style></head>
<body>
  <div class="row"><span class="tag">Sans — UI text</span><span class="sample" style="font-family:var(--font-sans); font-weight:600;">Plan the trip together</span></div>
  <div class="row"><span class="tag">Serif — display</span><span class="sample" style="font-family:var(--font-serif); font-style:italic;">Japan, November</span></div>
  <div class="row"><span class="tag">Mono — codes & figures</span><span class="sample" style="font-family:var(--font-mono); font-size:22px;">¥8,400 · JPN-2026</span></div>
</body></html>
