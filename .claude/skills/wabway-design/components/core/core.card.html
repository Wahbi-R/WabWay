<!-- @dsCard group="Components" viewport="700x900" name="Core" subtitle="Button, IconButton, Badge, Tag, Avatar, Card, Tabs, Tooltip, Icon" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin: 0; background: var(--color-bg); font-family: var(--font-sans); }
  .row { display: flex; flex-wrap: wrap; align-items: center; gap: 12px; padding: 14px 18px; }
  .label { font-size: 11px; color: var(--color-text-tertiary); text-transform: uppercase; letter-spacing: 0.05em; padding: 10px 18px 0; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { Button, IconButton, Badge, Tag, Avatar, Card, PhotoSlot, Tabs, Tooltip, Icon } = window.WabwayDesignSystem_4e50d7;
const I = (name) => "../../assets/icons/" + name + ".svg";

function Demo() {
  const [tab, setTab] = React.useState('details');
  return (
    <div>
      <div className="label">Buttons</div>
      <div className="row">
        <Button variant="primary" icon={<Icon src={I('plus')} color="currentColor" />}>Add a spot</Button>
        <Button variant="secondary">Invite friends</Button>
        <Button variant="ghost">Filter</Button>
        <Button variant="danger" size="sm">Remove</Button>
        <Button variant="primary" loading>Saving</Button>
        <Button variant="primary" disabled>Disabled</Button>
      </div>
      <div className="label">Icon buttons</div>
      <div className="row">
        <IconButton icon={<Icon src={I('ellipsis')} />} label="More" />
        <IconButton icon={<Icon src={I('plus')} />} label="Add" variant="solid" />
        <IconButton icon={<Icon src={I('house')} />} label="Home" active />
        <Tooltip label="Invite friends"><IconButton icon={<Icon src={I('user-plus')} />} label="Invite" /></Tooltip>
      </div>
      <div className="label">Badges</div>
      <div className="row">
        <Badge tone="success">Booked</Badge>
        <Badge tone="warning">Pending</Badge>
        <Badge tone="danger">Skipped</Badge>
        <Badge tone="primary" icon={<Icon src={I('map-pin')} />}>Tokyo</Badge>
        <Badge tone="neutral">Idea</Badge>
      </div>
      <div className="label">Tags</div>
      <div className="row">
        <Tag selected>Food</Tag>
        <Tag>Temple</Tag>
        <Tag onRemove={() => {}}>Shibuya</Tag>
      </div>
      <div className="label">Avatars</div>
      <div className="row">
        <Avatar name="Alex Kim" size="xs" />
        <Avatar name="Josh Park" size="sm" />
        <Avatar name="Matt Lee" size="md" />
        <Avatar name="Priya Shah" size="lg" />
        <Avatar name="You" size="xl" />
      </div>
      <div className="label">Tabs</div>
      <div className="row" style={{paddingTop: 0}}>
        <Tabs tabs={[{value:'details',label:'Details'},{value:'comments',label:'Comments'},{value:'activity',label:'Activity'}]} value={tab} onChange={setTab} />
      </div>
      <div className="label">Card &amp; photo slot</div>
      <div className="row" style={{alignItems: 'stretch'}}>
        <Card hoverable style={{width: 220}}>
          <div style={{fontWeight: 700, marginBottom: 4}}>Hoverable card</div>
          <div style={{color: 'var(--color-text-secondary)', fontSize: 13}}>Lifts on hover</div>
        </Card>
        <div style={{width: 200}}>
          <PhotoSlot icon={<Icon src={I('image')} />} label="Add a cover photo" />
        </div>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>
