<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; background:var(--color-surface); font-family: var(--font-sans); padding: 16px 22px; }
  .row { display:flex; align-items:baseline; gap: 14px; padding: 6px 0; }
  .tag { width: 130px; font-size: 11px; color: var(--color-text-tertiary); font-family: var(--font-mono); flex-shrink:0; }
  .sample { color: var(--color-text-primary); font-weight: 700; }
</style></head>
<body>
  <div class="row"><span class="tag">display / 42</span><span class="sample" style="font-size:var(--text-display)">Trip Home</span></div>
  <div class="row"><span class="tag">heading-lg / 34</span><span class="sample" style="font-size:var(--text-heading-lg)">Settle Up</span></div>
  <div class="row"><span class="tag">heading-md / 28</span><span class="sample" style="font-size:var(--text-heading-md)">Spots</span></div>
  <div class="row"><span class="tag">heading-sm / 23</span><span class="sample" style="font-size:var(--text-heading-sm)">Add a receipt</span></div>
  <div class="row"><span class="tag">title / 19</span><span class="sample" style="font-size:var(--text-title); font-weight:600;">Fushimi Inari Shrine</span></div>
  <div class="row"><span class="tag">body / 15</span><span class="sample" style="font-size:var(--text-body); font-weight:400;">We should go early before it gets packed.</span></div>
  <div class="row"><span class="tag">caption / 13</span><span class="sample" style="font-size:var(--text-caption); font-weight:500; color:var(--color-text-secondary);">Added by Alex Kim · 2d ago</span></div>
</body></html>
