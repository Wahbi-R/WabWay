<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; background:var(--color-bg); font-family: var(--font-sans); padding: 22px; display:flex; gap: 36px; align-items:center; }
  .mark { width: 56px; height: 56px; border-radius: 16px; background: var(--color-primary); color:#fff; display:flex; align-items:center; justify-content:center; font-family: var(--font-serif); font-weight:600; font-size: 28px; }
  .word { font-family: var(--font-sans); font-weight: 800; font-size: 32px; color: var(--color-text-primary); letter-spacing: -0.01em; }
  .tag { font-family: var(--font-serif); font-style: italic; font-size: 15px; color: var(--color-text-secondary); margin-top: 4px; }
</style></head>
<body>
  <div class="mark">W</div>
  <div><div class="word">Wabway</div><div class="tag">Plan the trip together.</div></div>
</body></html>
