<!-- @dsCard group="Spacing" viewport="700x260" name="Spacing Scale" subtitle="4px base unit, 4 through 80" -->
<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; background:var(--color-surface); font-family: var(--font-sans); padding: 18px 22px; }
  .row { display:flex; align-items:center; gap: 12px; padding: 5px 0; }
  .tag { width: 90px; font-size: 11px; font-family: var(--font-mono); color: var(--color-text-tertiary); }
  .bar { background: var(--color-primary); height: 14px; border-radius: 4px; }
</style></head>
<body>
  <div class="row"><span class="tag">4 · space-1</span><div class="bar" style="width:4px"></div></div>
  <div class="row"><span class="tag">8 · space-2</span><div class="bar" style="width:8px"></div></div>
  <div class="row"><span class="tag">12 · space-3</span><div class="bar" style="width:12px"></div></div>
  <div class="row"><span class="tag">16 · space-4</span><div class="bar" style="width:16px"></div></div>
  <div class="row"><span class="tag">20 · space-5</span><div class="bar" style="width:20px"></div></div>
  <div class="row"><span class="tag">24 · space-6</span><div class="bar" style="width:24px"></div></div>
  <div class="row"><span class="tag">32 · space-8</span><div class="bar" style="width:32px"></div></div>
  <div class="row"><span class="tag">48 · space-12</span><div class="bar" style="width:48px"></div></div>
  <div class="row"><span class="tag">64 · space-16</span><div class="bar" style="width:64px"></div></div>
  <div class="row"><span class="tag">80 · space-20</span><div class="bar" style="width:80px"></div></div>
</body></html>
