<!-- @dsCard group="Colors" viewport="700x150" name="Semantic States" subtitle="Success, warning, danger — warm-shifted, never stock RGB" -->
<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; font-family: var(--font-sans); }
  .row { display:flex; height:150px; }
  .sw { flex:1; display:flex; flex-direction:column; justify-content:flex-end; padding:10px 12px; color:#fff; }
  .name { font-weight:700; font-size:13px; }
  .hex { font-family: var(--font-mono); font-size:11px; opacity:0.9; }
</style></head>
<body>
<div class="row">
  <div class="sw" style="background:var(--base-success)"><div class="name">Success</div><div class="hex">#4F8A5B</div></div>
  <div class="sw" style="background:var(--base-warning)"><div class="name">Warning</div><div class="hex">#C98A2E</div></div>
  <div class="sw" style="background:var(--base-danger)"><div class="name">Danger</div><div class="hex">#B94A48</div></div>
</div>
</body></html>
