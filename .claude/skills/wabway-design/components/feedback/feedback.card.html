<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin: 0; background: var(--color-bg); font-family: var(--font-sans); }
  .section { padding: 14px 18px; }
  .label { font-size: 11px; color: var(--color-text-tertiary); text-transform: uppercase; letter-spacing: 0.05em; padding: 4px 0; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { Toast, Dialog, EmptyState, LoadingState, ErrorState, Banner, Button, Icon } = window.WabwayDesignSystem_4e50d7;
const I = (n) => "../../assets/icons/" + n + ".svg";

function Demo() {
  return (
    <div>
      <div className="section">
        <div className="label">Banner</div>
        <Banner tone="warning" icon={<Icon src={I('triangle-alert')} />}>3 friends still need to settle up</Banner>
      </div>
      <div className="section" style={{display:'flex', gap: 12}}>
        <Toast message="Spot added to Tokyo" icon={<Icon src={I('circle-check')} />} />
      </div>
      <div className="section">
        <div className="label">Empty state</div>
        <EmptyState icon={<Icon src={I('map-pin')} />} title="No spots yet" description="Add the first place worth visiting." action={<Button size="sm">Add a spot</Button>} />
      </div>
      <div className="section">
        <div className="label">Loading state</div>
        <LoadingState rows={2} />
      </div>
      <div className="section">
        <div className="label">Error state</div>
        <ErrorState icon={<Icon src={I('wifi-off')} />} title="Couldn't load this trip" action={<Button variant="ghost" size="sm">Try again</Button>} />
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>
