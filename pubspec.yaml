    sdk: flutter
  google_fonts: ^6.2.1
  go_router: ^14.2.7
  url_launcher: ^6.3.1
  supabase_flutter: ^2.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
