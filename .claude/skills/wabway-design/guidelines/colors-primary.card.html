<!-- @dsCard group="Colors" viewport="700x150" name="Primary, Secondary, Accent" subtitle="Terracotta primary, sage secondary, gold accent" -->
<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; background:var(--color-bg); font-family: var(--font-sans); }
  .row { display:flex; height:150px; }
  .sw { flex:1; display:flex; flex-direction:column; justify-content:flex-end; padding:10px 12px; color:#fff; }
  .name { font-weight:700; font-size:13px; }
  .hex { font-family: var(--font-mono); font-size:11px; opacity:0.85; }
</style></head>
<body>
<div class="row">
  <div class="sw" style="background:var(--base-terracotta)"><div class="name">Primary</div><div class="hex">#C96F4A</div></div>
  <div class="sw" style="background:var(--base-terracotta-dk)"><div class="name">Primary Dark</div><div class="hex">#9F4F34</div></div>
  <div class="sw" style="background:var(--base-sage)"><div class="name">Secondary</div><div class="hex">#7D9A75</div></div>
  <div class="sw" style="background:var(--base-gold); color:var(--base-ink)"><div class="name">Accent</div><div class="hex">#D6A84F</div></div>
</div>
</body></html>
