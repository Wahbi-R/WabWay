<!-- @dsCard group="Brand" viewport="700x180" name="Shadow Scale" subtitle="Soft, warm-tinted (ink-brown, never pure black)" -->
<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; background:var(--color-bg); font-family: var(--font-sans); padding: 24px 22px; display:flex; gap: 28px; }
  .col { display:flex; flex-direction:column; align-items:center; gap:10px; }
  .box { width: 100px; height: 70px; background: var(--color-surface); border-radius: var(--radius-md); }
  .lbl { font-size: 11px; font-family: var(--font-mono); color: var(--color-text-tertiary); }
</style></head>
<body>
  <div class="col"><div class="box" style="box-shadow:var(--shadow-xs)"></div><span class="lbl">xs</span></div>
  <div class="col"><div class="box" style="box-shadow:var(--shadow-sm)"></div><span class="lbl">sm · resting card</span></div>
  <div class="col"><div class="box" style="box-shadow:var(--shadow-md)"></div><span class="lbl">md · raised/hover</span></div>
  <div class="col"><div class="box" style="box-shadow:var(--shadow-lg)"></div><span class="lbl">lg · modal/sheet</span></div>
</body></html>
