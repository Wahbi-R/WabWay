<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; background:var(--color-bg); font-family: var(--font-sans); padding: 18px 22px; display:flex; gap: 18px; align-items:flex-end; }
  .col { display:flex; flex-direction:column; align-items:center; gap:8px; }
  .box { width: 72px; height: 72px; background: var(--color-surface); border: 1.5px solid var(--color-border); }
  .lbl { font-size: 11px; font-family: var(--font-mono); color: var(--color-text-tertiary); }
</style></head>
<body>
  <div class="col"><div class="box" style="border-radius:var(--radius-xs)"></div><span class="lbl">xs · 6</span></div>
  <div class="col"><div class="box" style="border-radius:var(--radius-sm)"></div><span class="lbl">sm · 10</span></div>
  <div class="col"><div class="box" style="border-radius:var(--radius-md)"></div><span class="lbl">md · 14</span></div>
  <div class="col"><div class="box" style="border-radius:var(--radius-lg)"></div><span class="lbl">lg · 20</span></div>
  <div class="col"><div class="box" style="border-radius:var(--radius-xl)"></div><span class="lbl">xl · 28</span></div>
  <div class="col"><div class="box" style="border-radius:var(--radius-pill); width:110px;"></div><span class="lbl">pill</span></div>
</body></html>
