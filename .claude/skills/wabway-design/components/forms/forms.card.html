<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin: 0; background: var(--color-bg); font-family: var(--font-sans); }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; padding: 18px; }
  .stack { display: flex; flex-direction: column; gap: 12px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { Input, Textarea, Select, Checkbox, Radio, Switch, Icon } = window.WabwayDesignSystem_4e50d7;
const I = (n) => "../../assets/icons/" + n + ".svg";

function Demo() {
  const [check, setCheck] = React.useState(true);
  const [radio, setRadio] = React.useState('equal');
  const [on, setOn] = React.useState(true);
  return (
    <div className="grid">
      <div className="stack">
        <Input label="Trip name" placeholder="Japan, November" />
        <Input label="Amount" type="number" icon={<Icon src={I('banknote')} />} />
        <Input label="Invite code" value="JPN-2026" error="" disabled />
        <Select label="Category" value="food" onChange={()=>{}} options={[{value:'food',label:'Food'},{value:'temple',label:'Temple'},{value:'shopping',label:'Shopping'}]} />
      </div>
      <div className="stack">
        <Textarea label="Notes" placeholder="Looks like a ramen spot near Shinjuku." />
        <Checkbox label="Alex Kim" checked={check} onChange={setCheck} />
        <Checkbox label="Josh Park" checked={false} onChange={()=>{}} />
        <Radio label="Equal split" checked={radio==='equal'} onChange={() => setRadio('equal')} />
        <Radio label="Custom amounts" checked={radio==='custom'} onChange={() => setRadio('custom')} />
        <Switch label="Push notifications" checked={on} onChange={setOn} />
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>
